# .pre-commit-config.yaml
repos:
  # File hygiene hooks — trailing whitespace, file validation, secret detection
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  # Local project hooks
  - repo: local
    hooks:
      - id: ruff
        name: ruff (backend)
        entry: bash -c "backend/venv/Scripts/ruff check backend/src/ backend/tests/"
        language: system
        files: ^backend/
        types: [python]
        pass_filenames: false

      - id: lint-staged-frontend
        name: lint-staged (frontend)
        entry: bash -c "cd frontend && npx lint-staged"
        language: system
        files: ^frontend/
        pass_filenames: false
